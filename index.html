<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💾 3D Disk Drive - Real Disk Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #00ff41;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00ff41;
        }

        .drive-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: blink 1.5s infinite;
        }

        .status-light.active {
            background: #00ff41;
            animation: none;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        /* Main Drive */
        .drive-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
        }

        .disk-drive {
            width: 400px;
            height: 300px;
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 20px;
            position: relative;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.5),
                inset 0 5px 20px rgba(255,255,255,0.1);
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .disk-drive:hover {
            transform: rotateY(5deg) rotateX(2deg);
        }

        /* Drive Components */
        .eject-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255,107,53,0.4);
            transition: all 0.3s ease;
        }

        .eject-button:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(255,107,53,0.6);
        }

        .drive-slot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 60px;
            background: linear-gradient(90deg, #333 0%, #111 50%, #333 100%);
            border-radius: 10px;
            border: 3px solid #555;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
        }

        /* 3D Disk */
        .disk {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(90deg) translateZ(-10px);
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #1e3c72 0deg 90deg,
                #2a5298 90deg 180deg,
                #00d4ff 180deg 270deg,
                #0099cc 270deg 360deg
            );
            box-shadow: 
                0 10px 30px rgba(0,212,255,0.4),
                inset 0 0 30px rgba(255,255,255,0.2),
                inset 130px 130px 40px rgba(0,0,0,0.5);
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            opacity: 0;
        }

        .disk.spinning {
            animation: spinDisk 2s linear infinite;
            transform: translate(-50%, -50%) rotateX(90deg) translateZ(5px);
        }

        @keyframes spinDisk {
            0% { transform: translate(-50%, -50%) rotateX(90deg) translateZ(5px) rotateZ(0deg); }
            100% { transform: translate(-50%, -50%) rotateX(90deg) translateZ(5px) rotateZ(360deg); }
        }

        .disk-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #111 0%, #000 70%, #222 100%);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .disk-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 40px;
            background: linear-gradient(145deg, #00ff41, #00cc33);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
            box-shadow: 0 4px 12px rgba(0,255,65,0.4);
        }

        /* File Explorer */
        .file-explorer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00ff41;
            min-width: 350px;
            max-height: 200px;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .file-explorer.active {
            opacity: 1;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .file-item:hover {
            background: rgba(0,255,65,0.1);
            padding-left: 10px;
        }

        .file-icon {
            font-size: 20px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .disk-drive {
                width: 320px;
                height: 240px;
            }
            
            .drive-slot {
                width: 220px;
                height: 50px;
            }
            
            .disk {
                width: 200px;
                height: 200px;
            }
        }

        /* Matrix Effect */
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <!-- Matrix Background -->
    <canvas class="matrix-bg" id="matrix"></canvas>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div>💾 3D DISK DRIVE v2.0</div>
            <div class="drive-status">
                <div class="status-light" id="statusLight"></div>
                <span id="statusText">READY</span>
            </div>
        </div>

        <!-- Main Drive -->
        <div class="drive-container">
            <div class="disk-drive" id="diskDrive">
                <button class="eject-button" onclick="ejectDisk()">⏏</button>
                <div class="drive-slot"></div>
                <div class="disk" id="disk">
                    <div class="disk-hole"></div>
                    <div class="disk-label">MY_DISK</div>
                </div>
            </div>
        </div>

        <!-- File Explorer -->
        <div class="file-explorer" id="fileExplorer">
            <div style="margin-bottom: 15px; font-weight: bold;">📂 Disk Contents:</div>
            <div id="fileList"></div>
        </div>
    </div>

    <script>
        // Matrix Rain Effect
        function initMatrix() {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            
            function draw() {
                ctx.fillStyle = 'rgba(0,0,35,0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#00ff41';
                ctx.font = `${fontSize}px monospace`;
                
                drops.forEach((y, i) => {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    
                    if (y * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                });
            }
            
            setInterval(draw, 50);
        }

        // Disk Functions
        const disk = document.getElementById('disk');
        const statusLight = document.getElementById('statusLight');
        const statusText = document.getElementById('statusText');
        const fileExplorer = document.getElementById('fileExplorer');
        const fileList = document.getElementById('fileList');

        const diskFiles = [
            { icon: '📄', name: 'README.txt', size: '2KB' },
            { icon: '🖼️', name: 'photo.jpg', size: '1.2MB' },
            { icon: '🎵', name: 'song.mp3', size: '4.5MB' },
            { icon: '📁', name: 'Projects', size: '256MB' },
            { icon: '📊', name: 'data.csv', size: '128KB' }
        ];

        function insertDisk() {
            disk.style.opacity = '1';
            statusLight.classList.add('active');
            statusText.textContent = 'DISK INSERTED';
            setTimeout(() => {
                statusText.textContent = 'READY';
            }, 1500);
        }

        function ejectDisk() {
            disk.classList.remove('spinning');
            statusLight.classList.remove('active');
            statusText.textContent = 'EJECTING...';
            fileExplorer.classList.remove('active');
            
            setTimeout(() => {
                disk.style.opacity = '0';
                statusText.textContent = 'NO DISK';
            }, 1000);
        }

        function readDisk() {
            disk.classList.add('spinning');
            statusText.textContent = 'READING...';
            statusLight.style.background = '#ffaa00';
            
            setTimeout(() => {
                statusLight.classList.add('active');
                statusLight.style.background = '#00ff41';
                statusText.textContent = 'READY';
                fileExplorer.classList.add('active');
                displayFiles();
            }, 2500);
        }

        function displayFiles() {
            fileList.innerHTML = '';
            diskFiles.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<span class="file-icon">${file.icon}</span><span>${file.name}</span><span style="margin-left:auto;color:#888;">${file.size}</span>`;
                div.onclick = () => openFile(file);
                fileList.appendChild(div);
            });
        }

        function openFile(file) {
            alert(`Opening: ${file.name}\nSize: ${file.size}\n\nDisk file opened successfully! ✅`);
        }

        // Event Listeners
        disk.addEventListener('transitionend', function(e) {
            if (e.propertyName === 'opacity' && disk.style.opacity == '1') {
                readDisk();
            }
        });

        disk.onclick = function() {
            if (!disk.classList.contains('spinning')) {
                readDisk();
            }
        };

        // Auto insert on load
        window.onload = function() {
            initMatrix();
            setTimeout(insertDisk, 1000);
        };

        // Resize handler
        window.onresize = function() {
            initMatrix();
        };
    </script>
</body>
  </html>
